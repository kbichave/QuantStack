# LiteLLM Proxy Configuration
# Model groups match tier names used by get_chat_model() — no translation needed.

model_list:
  # --- heavy: Sonnet-class, complex reasoning ---
  - model_name: heavy
    litellm_params:
      model: bedrock/us.anthropic.claude-sonnet-4-6
      aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID
      aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY
      aws_region_name: os.environ/AWS_DEFAULT_REGION
    model_info:
      priority: 1
  - model_name: heavy
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      priority: 2
  - model_name: heavy
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
    model_info:
      priority: 3

  # --- medium: Haiku-class, structured extraction ---
  - model_name: medium
    litellm_params:
      model: bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0
      aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID
      aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY
      aws_region_name: os.environ/AWS_DEFAULT_REGION
    model_info:
      priority: 1
  - model_name: medium
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      priority: 2

  # --- light: cheapest Haiku, simple coordination ---
  - model_name: light
    litellm_params:
      model: bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0
      aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID
      aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY
      aws_region_name: os.environ/AWS_DEFAULT_REGION
    model_info:
      priority: 1
  - model_name: light
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      priority: 2

  # --- bulk: OPRO/TextGrad loops, cost-sensitive ---
  - model_name: bulk
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
    model_info:
      priority: 1
  - model_name: bulk
    litellm_params:
      model: bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0
      aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID
      aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY
      aws_region_name: os.environ/AWS_DEFAULT_REGION
    model_info:
      priority: 2

  # --- embedding: local ---
  - model_name: embedding
    litellm_params:
      model: ollama/mxbai-embed-large
      api_base: os.environ/OLLAMA_API_BASE

router_settings:
  routing_strategy: "simple-shuffle"
  allowed_fails: 3
  cooldown_time: 60
  num_retries: 2
  retry_after: 5
  enable_pre_call_checks: true
  retry_policy:
    RateLimitErrorRetries: 3
    TimeoutErrorRetries: 2
    AuthenticationErrorRetries: 0

litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  callbacks: ["langfuse"]
