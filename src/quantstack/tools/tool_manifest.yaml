# Tool Lifecycle Manifest
# ----------------------
# Each tool in TOOL_REGISTRY gets an entry here with a status:
#   active   — fully operational, resolved for agent use
#   planned  — stub or not yet implemented, excluded from agent resolution
#   degraded — failing above threshold, auto-disabled by health monitor
#
# To add a new tool: add an entry with status: planned, then implement it,
# then flip to active. The health monitor may auto-move tools to degraded.

tools:
  # Signal & analysis
  signal_brief:
    status: active
  multi_signal_brief:
    status: active

  # Data
