[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name             tail
    Path             /var/lib/docker/containers/*/*.log
    Parser           docker
    Tag              docker.*
    Docker_Mode      On
    Refresh_Interval 10
    Mem_Buf_Limit    5MB
    Skip_Long_Lines  On

[FILTER]
    Name   parser
    Match  docker.*
    Key_Name log
    Parser  json
    Reserve_Data On

[OUTPUT]
    Name   loki
    Match  docker.*
    Host   loki
    Port   3100
    Labels job=$TAG, level=$level
    Auto_Kubernetes_Labels Off
