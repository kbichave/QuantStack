# QuantStack LangGraph Stack
# 7 infrastructure + graph services, plus legacy API and MCP profiles
#
# Usage:
#   docker compose up -d                    # Start all graph + infra services
#   docker compose --profile legacy up -d   # Also start legacy API + Alpaca MCP
#   docker compose logs -f trading-graph    # Follow trading graph logs
#   docker compose down                     # Stop everything
#   docker compose down -v                  # Stop and delete data volumes
#
# Secrets: copy .env.example -> .env and fill in values.

# Shared bind mounts for all graph services.
# Host paths → container paths — models, logs, memory, and execution state
# persist across rebuilds and restarts.
x-graph-volumes: &graph-volumes
  - ./models:/app/models                          # ML model checkpoints (joblib, pkl)
  - ./data:/app/data                              # Market data cache, DuckDB files
  - ./logs:/app/logs                              # Application logs (trader.log)
  - ./.claude/memory:/app/.claude/memory           # Trade journal, workshop lessons
  - ~/.quantstack:/root/.quantstack               # Kill switch, drift baselines, FinRL, Qdrant, structured logs

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    container_name: quantstack-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: quantstack
      POSTGRES_USER: quantstack
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quantstack}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantstack"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped
    networks:
      - quantstack-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  langfuse-db:
    image: postgres:16-alpine
    container_name: quantstack-langfuse-db
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:-langfuse}
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 256m
    memswap_limit: 256m
    restart: unless-stopped
    networks:
      - quantstack-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  ollama:
    image: ollama/ollama
    container_name: quantstack-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 4g
    memswap_limit: 4g
    restart: unless-stopped
    networks:
      - quantstack-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  langfuse:
    image: langfuse/langfuse:2
    container_name: quantstack-langfuse
    ports:
      - "3100:3000"
    depends_on:
      langfuse-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD:-langfuse}@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-random-secret}
      SALT: ${SALT:-change-me-random-salt}
      NEXTAUTH_URL: http://localhost:3000
      LANGFUSE_INIT_ORG_ID: quantstack
      LANGFUSE_INIT_ORG_NAME: QuantStack
      LANGFUSE_INIT_PROJECT_ID: trading
      LANGFUSE_INIT_PROJECT_NAME: Trading
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-quantstack-local}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-quantstack-local}
      LANGFUSE_INIT_USER_EMAIL: admin@quantstack.local
      LANGFUSE_INIT_USER_NAME: quantstack
      LANGFUSE_INIT_USER_PASSWORD: quantstack123
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://$(hostname -i):3000/api/public/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped
    networks:
      - quantstack-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Graph Services ───────────────────────────────────────────────────────────

  trading-graph:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quantstack-trading-graph
    command: ["python", "-m", "quantstack.runners.trading_runner"]
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      langfuse:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    volumes: *graph-volumes
    healthcheck:
      test: ["CMD", "python", "-c", "from quantstack.health.heartbeat import check_health; check_health('trading')"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s
    mem_limit: 1g
    memswap_limit: 1g
    stop_grace_period: 90s
    restart: unless-stopped
    networks:
      - quantstack-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  research-graph:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quantstack-research-graph
    command: ["python", "-m", "quantstack.runners.research_runner"]
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      langfuse:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    volumes: *graph-volumes
    healthcheck:
      test: ["CMD", "python", "-c", "from quantstack.health.heartbeat import check_health; check_health('research')"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s
    mem_limit: 1g
    memswap_limit: 1g
    stop_grace_period: 90s
    restart: unless-stopped
    networks:
      - quantstack-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  supervisor-graph:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quantstack-supervisor-graph
    command: ["python", "-m", "quantstack.runners.supervisor_runner"]
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      langfuse:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    volumes: *graph-volumes
    healthcheck:
      test: ["CMD", "python", "-c", "from quantstack.health.heartbeat import check_health; check_health('supervisor')"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s
    mem_limit: 512m
    memswap_limit: 512m
    stop_grace_period: 90s
    restart: unless-stopped
    networks:
      - quantstack-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Legacy Services (optional) ──────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: quantstack:latest
    container_name: quantstack-api
    ports:
      - "8420:8420"
    volumes:
      - quantstack-legacy-data:/data/quantstack
      - ./packages:/app/packages
    env_file:
      - path: .env
        required: false
    environment:
      - ALPACA_API_KEY=${ALPACA_API_KEY:-}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY:-}
      - ALPACA_PAPER=${ALPACA_PAPER:-true}
      - LLM_PROVIDER=${LLM_PROVIDER:-bedrock}
      - USE_REAL_TRADING=${USE_REAL_TRADING:-false}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8420/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    command: ["api"]
    networks:
      - quantstack-net
    profiles:
      - legacy

  alpaca-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: quantstack:latest
    container_name: quantstack-alpaca-mcp
    ports:
      - "8430:8430"
    env_file:
      - path: .env
        required: false
    environment:
      - ALPACA_API_KEY=${ALPACA_API_KEY:-}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY:-}
      - ALPACA_PAPER=${ALPACA_PAPER:-true}
    command: ["sh", "-c", "alpaca-mcp --transport sse --port 8430"]
    restart: unless-stopped
    networks:
      - quantstack-net
    profiles:
      - mcp-servers

volumes:
  postgres-data:
    driver: local
  langfuse-db-data:
    driver: local
  ollama-data:
    driver: local
  quantstack-legacy-data:
    driver: local

networks:
  quantstack-net:
    driver: bridge
