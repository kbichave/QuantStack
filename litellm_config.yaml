# LiteLLM Proxy Configuration
# Model groups match tier names used by get_chat_model() — no translation needed.
# Provider strategy: Groq Qwen3-32B for all operational tiers,
# OpenAI gpt-oss-120b for heavy reasoning. No AWS Bedrock.

model_list:
  # --- heavy: complex reasoning (fund-manager, trade-debater, quant-researcher) ---
  - model_name: heavy
    litellm_params:
      model: openai/gpt-oss-120b
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      priority: 1
  - model_name: heavy
    litellm_params:
      model: groq/qwen/qwen3-32b
      api_key: os.environ/GROQ_API_KEY
    model_info:
      priority: 2

  # --- medium: structured extraction (earnings-analyst, position-monitor, daily-planner) ---
  - model_name: medium
    litellm_params:
      model: groq/qwen/qwen3-32b
      api_key: os.environ/GROQ_API_KEY
    model_info:
      priority: 1
  - model_name: medium
    litellm_params:
      model: openai/gpt-oss-120b
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      priority: 2

  # --- light: simple coordination (supervisor, health-monitor) ---
  - model_name: light
    litellm_params:
      model: groq/qwen/qwen3-32b
      api_key: os.environ/GROQ_API_KEY
    model_info:
      priority: 1

  # --- bulk: OPRO/TextGrad loops, cost-sensitive ---
  - model_name: bulk
    litellm_params:
      model: groq/qwen/qwen3-32b
      api_key: os.environ/GROQ_API_KEY
    model_info:
      priority: 1

  # --- embedding: local ---
  - model_name: embedding
    litellm_params:
      model: ollama/mxbai-embed-large
      api_base: os.environ/OLLAMA_API_BASE

router_settings:
  routing_strategy: "simple-shuffle"
  allowed_fails: 3
  cooldown_time: 60
  num_retries: 2
  retry_after: 5
  enable_pre_call_checks: true
  retry_policy:
    RateLimitErrorRetries: 3
    TimeoutErrorRetries: 2
    AuthenticationErrorRetries: 0

litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  callbacks: ["langfuse"]
